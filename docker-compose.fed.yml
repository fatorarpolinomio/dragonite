services:
  psql_dragonite_fed:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: dragonite-database
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - psql_volume_dragonite_fed:/var/lib/postgresql
  redis_dragonite_fed:
    image: redis:latest
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: admin123
    ports:
      - "16380:6379"
  minio_dragonite_fed:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: dragonite_minio_user
      MINIO_ROOT_PASSWORD: dragonite_minio_password
    ports:
      - "9010:9000" # API S3 — usada pela aplicação
      - "9011:9001" # Console web — acesse em http://localhost:9001
    volumes:
      - minio_volume_dragonite_fed:/data
    command: server /data --console-address ":9011"
volumes:
  psql_volume_dragonite_fed:
  minio_volume_dragonite_fed:
